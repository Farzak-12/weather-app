<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="/src/style.css" rel="stylesheet">
</head>
<body>

  <nav class="flex justify-between items-center">
    <a href="#" class="">
      <img src="src/assets/images/logo.svg" alt="">
    </a>

    <button class="bg-neutral-700 w-20 p-1.5 items-center flex  justify-between rounded h-fit shadow">
      <img src="src/assets/images/icon-units.svg" alt="units" class="w-3 h-3">
      <p class="font-heading text-sm">Units</p>
      <img src="src/assets/images/icon-dropdown.svg" class="w-3 h-3" alt="drowpdown">
    </button>
  </nav>

  <head>
    <h1 class="text-center text-5xl my-10">How's the sky looking today?</h1>
    <form action="" method="" class="flex justify-center gap-x-4">
      <input type="text" name="place" id="place" class="bg-neutral-700 w-[40%] rounded-lg  p-2" placeholder="Search for a place...">
      <button type="submit" class="bg-blue-500 p-2 rounded-lg">Search</button>
    </form>
  </head>

  <main class="flex justify-between mt-5">
    <section class="w-[67%]">
      <section class="h-50 bg-cover bg-center rounded-xl bg-todayl mb-4"></section>
      
      <section class="grid grid-cols-4 space-x-5">
        <div class="h-20 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
        <div class="h-20 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
        <div class="h-20 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
        <div class="h-20 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
      </section>

      <p class="mb-2">Daily forecast</p>
      <section class="grid space-x-3 grid-cols-7">
        <div class="h-30 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
        <div class="h-30 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
        <div class="h-30 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
        <div class="h-30 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
        <div class="h-30 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
        <div class="h-30 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
        <div class="h-30 bg-neutral-700 rounded-lg p-5 border border-neutral-600"></div>
        
      </section>
    </section>

    <section class="h-auto w-[30%] bg-neutral-700 rounded-xl">

    </section>
  </main>

</body>
</html>
